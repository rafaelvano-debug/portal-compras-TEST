<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquaservice · Portal de Compras Internas</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#f4f3ef;--surface:#fff;--surface2:#f9f8f5;--border:#e5e3db;
  --accent:#0077c8;--accent-light:#e8f3fc;--accent-dark:#005fa0;
  --text:#1a1a1a;--muted:#6b6b6b;--danger:#e04444;--success:#2da84f;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--accent)}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-sub{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px;border-left:1px solid var(--border);padding-left:10px}
.cart-btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.cart-btn:hover{background:var(--accent-dark)}
.badge{background:white;color:var(--accent);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.app{display:flex;min-height:calc(100vh - 60px)}
aside{width:256px;min-width:256px;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;padding:12px 0}
main{flex:1;padding:24px 28px;min-width:0}
.s-cat{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);margin-top:8px}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 8px 28px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:var(--muted);line-height:1.3}
.s-item:hover{background:var(--bg);color:var(--text)}
.s-item.active{border-left-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
.s-count{font-size:10px;font-family:'DM Mono',monospace;background:var(--border);color:var(--muted);border-radius:10px;padding:1px 6px}
.s-item.active .s-count{background:var(--accent);color:white}
.main-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.main-top h2{font-size:20px;font-weight:700}
.main-top p{font-size:12px;color:var(--muted);margin-top:2px}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:220px}
.search-wrap input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;background:transparent;color:var(--text);width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-img{width:100%;height:110px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);font-size:38px}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column}
.cat-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:7px;width:fit-content}
.ref-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.ref{font-size:10px;font-family:'DM Mono',monospace;background:#eef5fb;color:var(--accent);border-radius:4px;padding:1px 5px}
.pname{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:7px;flex:1}
.price{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:10px}
.price.na{font-size:12px;color:var(--muted);font-weight:400}
.qty-row{display:flex;align-items:center;gap:6px}
.qbtn{width:26px;height:26px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500}
.qbtn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.qinput{width:40px;height:26px;border:1px solid var(--border);border-radius:5px;text-align:center;font-family:'DM Mono',monospace;font-size:13px;outline:none;background:var(--surface)}
.qinput:focus{border-color:var(--accent)}
.abtn{margin-left:auto;background:var(--accent);color:white;border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.abtn:hover{background:var(--accent-dark)}
.abtn.ok{background:var(--success)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{font-size:17px;font-weight:600;margin:14px 0 6px;color:var(--text)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;right:0;top:0;bottom:0;width:460px;background:var(--surface);box-shadow:var(--shadow-lg);z-index:201;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.panel.open{transform:translateX(0)}
.ph{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ph h3{font-size:17px;font-weight:700}
.xbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.xbtn:hover{background:var(--bg)}
.fform{padding:16px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.fform h4{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ff input{border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:white}
.ff input:focus{border-color:var(--accent)}
.ff.full{grid-column:1/-1}
.citems{flex:1;overflow-y:auto;padding:14px 22px}
.cempty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}
.cgroup{margin-bottom:18px}
.cgtitle{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ci{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-ref{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.ci-price{font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap}
.rmbtn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px}
.rmbtn:hover{background:#ffeaea}
.pfoot{padding:18px 22px;border-top:1px solid var(--border)}
.ptotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ptotal strong{font-size:14px}
.tprice{font-size:22px;font-weight:700;color:var(--accent)}
.dlbtn{width:100%;background:var(--accent);color:white;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.dlbtn:hover{background:var(--accent-dark)}
.dlbtn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:white;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.welcome{padding:40px 20px;text-align:center;max-width:560px;margin:0 auto}
.welcome h2{font-size:26px;font-weight:700;margin-bottom:10px}
.welcome p{color:var(--muted);font-size:15px;line-height:1.6}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:28px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s}
.ccard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.ccard .ci2{font-size:30px;margin-bottom:8px}
.ccard .cn{font-size:13px;font-weight:600}
.ccard .cnn{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>

AP": "", "refProv": "", "desc": "Bandolera TNT", "price": 15.0, "proveedor_extra": "Proyectos Extraordinarios  105275"}, {"refSAP": "", "refProv": "", "desc": "Caja reciclar ropa", "price": 28.0, "proveedor_extra": "Proyectos Extraordinarios  105275"}]}};

var CC = {
  "mobiliario":          {icon:"🪑",color:"#4f7cac",label:"Mobiliario"},
  "cartelería":          {icon:"🪧",color:"#2e7d52",label:"Cartelería"},
  "material_corporativo":{icon:"📄",color:"#7b5ea7",label:"Material Corporativo"},
  "uniformidad":         {icon:"👕",color:"#c75b3a",label:"Uniformidad"},
  "dotacion_almacenes":  {icon:"🏭",color:"#b07c2f",label:"Dotación Almacenes"},
  "merchandising":       {icon:"🎁",color:"#c2445d",label:"Merchandising"},
  "premios":             {icon:"🏆",color:"#d4a017",label:"Premios"}
};

var active = null;
var cart = {};

function buildSidebar() {
  var groups = {};
  for (var name in CATS) {
    var c = CATS[name].categoria;
    if (!groups[c]) groups[c] = [];
    groups[c].push(name);
  }
  var html = '';
  for (var cat in groups) {
    var cfg = CC[cat] || {icon:'📦',color:'#888',label:cat};
    html += '<div><div class="s-cat"><span class="s-dot" style="background:'+cfg.color+'"></span>'+cfg.label+'</div>';
    for (var i=0; i<groups[cat].length; i++) {
      var n = groups[cat][i];
      var shortName = n.indexOf('·') >= 0 ? n.split('·')[1].trim() : n;
      html += '<div class="s-item'+(active===n?' active':'')+'" onclick="selectCat(''+n.replace(/'/g,"\\'")+'')" title="'+n+'"><span style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+shortName+'</span><span class="s-count">'+CATS[n].items.length+'</span></div>';
    }
    html += '</div>';
  }
  document.getElementById('sidebar').innerHTML = html;
}

function showWelcome() {
  var groups = {};
  for (var name in CATS) {
    var c = CATS[name].categoria;
    if (!groups[c]) groups[c] = {names:[],count:0};
    groups[c].names.push(name);
    groups[c].count += CATS[name].items.length;
  }
  var cards = '';
  for (var cat in groups) {
    var cfg = CC[cat] || {icon:'📦',color:'#888',label:cat};
    cards += '<div class="ccard" style="border-top:3px solid '+cfg.color+'" onclick="selectCat(''+groups[cat].names[0].replace(/'/g,"\\'")+'')">'
      +'<div class="ci2">'+cfg.icon+'</div>'
      +'<div class="cn">'+cfg.label+'</div>'
      +'<div class="cnn">'+groups[cat].count+' artículos</div>'
      +'</div>';
  }
  document.getElementById('main').innerHTML = '<div class="welcome"><div style="font-size:52px">💧</div><h2>Portal de Compras Internas</h2><p>Selecciona una categoría del menú lateral o haz clic en una tarjeta para ver los artículos disponibles.</p><div class="cgrid">'+cards+'</div></div>';
}

function selectCat(name) {
  active = name;
  buildSidebar();
  renderCatalog();
}

function renderCatalog() {
  if (!active || !CATS[active]) { showWelcome(); return; }
  var cat = CATS[active];
  var q = (document.getElementById('sq') ? document.getElementById('sq').value : '').toLowerCase();
  var items = cat.items.filter(function(i){ return !q || i.desc.toLowerCase().indexOf(q)>=0 || i.refSAP.indexOf(q)>=0; });
  var cfg = CC[cat.categoria] || {icon:'📦',color:'#888',label:cat.categoria};
  
  var html = '<div class="main-top"><div><h2>'+cfg.icon+' '+active+'</h2><p>'+cat.proveedor+' · '+items.length+' artículos</p></div>'
    +'<div class="search-wrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'
    +'<input type="text" placeholder="Buscar artículo..." id="sq" oninput="renderCatalog()" value="'+q+'"></div></div>'
    +'<div class="grid">';

  if (!items.length) {
    html += '<div class="empty"><div style="font-size:32px">🔍</div><h3>Sin resultados</h3><p>Prueba con otro término</p></div>';
  } else {
    for (var i=0; i<items.length; i++) {
      var item = items[i];
      var key = item.refSAP+'||'+active;
      var inCart = cart[key];
      var qty = inCart ? inCart.qty : 1;
      var priceStr = item.price > 0 ? item.price.toFixed(2).replace('.',',')+' €' : 'Precio a consultar';
      var safeKey = key.replace(/['"\]/g,'_');
      html += '<div class="card">'
        +'<div class="card-img" style="color:'+cfg.color+'">'+cfg.icon+'</div>'
        +'<div class="card-body">'
        +'<span class="cat-tag" style="background:'+cfg.color+'22;color:'+cfg.color+'">'+cfg.label+'</span>'
        +(item.refSAP ? '<div class="ref-row"><span class="ref">SAP: '+item.refSAP+'</span></div>' : '')
        +'<div class="pname">'+item.desc+'</div>'
        +'<div class="price'+(item.price>0?'':' na')+'">'+priceStr+'</div>'
        +'<div class="qty-row">'
        +'<button class="qbtn" onclick="chgQty(''+safeKey+'',-1)">−</button>'
        +'<input class="qinput" type="number" min="1" value="'+qty+'" id="q_'+safeKey+'" onchange="setQty(''+safeKey+'',this.value)">'
        +'<button class="qbtn" onclick="chgQty(''+safeKey+'',1)">+</button>'
        +'<button class="abtn'+(inCart?' ok':'')+'" onclick="addItem(''+item.refSAP.replace(/'/g,"\\'")+'')">'+(inCart?'✓ Añadido':'+ Añadir')+'</button>'
        +'</div></div></div>';
    }
  }
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

function chgQty(safeKey, d) {
  var el = document.getElementById('q_'+safeKey);
  if (!el) return;
  var v = parseInt(el.value)+d; if(v<1)v=1; el.value=v;
  var key = findKey(safeKey);
  if (key && cart[key]) { cart[key].qty=v; updateCount(); }
}
function setQty(safeKey, val) {
  var v=parseInt(val); if(isNaN(v)||v<1)v=1;
  var key=findKey(safeKey);
  if(key&&cart[key]){cart[key].qty=v;updateCount();}
}
function findKey(safeKey) {
  for (var k in cart) { if(k.replace(/['"\]/g,'_')===safeKey) return k; }
  return null;
}
function addItem(refSAP) {
  if (!active || !CATS[active]) return;
  var items = CATS[active].items;
  var item = null;
  for (var i=0; i<items.length; i++) { if(items[i].refSAP===refSAP){item=items[i];break;} }
  if (!item) return;
  var safeKey = (item.refSAP+'||'+active).replace(/['"\]/g,'_');
  var el = document.getElementById('q_'+safeKey);
  var qty = el ? (parseInt(el.value)||1) : 1;
  var key = item.refSAP+'||'+active;
  if (cart[key]) { cart[key].qty+=qty; } else { cart[key]={item:item,qty:qty,provider:active}; }
  renderCatalog();
  updateCount();
  showToast('✓ '+item.desc.substring(0,35)+' añadido');
}
function removeItem(safeKey) {
  var key=findKey(safeKey);
  if(key){delete cart[key];}
  updateCount();
  renderCartItems();
  renderCatalog();
}
function updateCount() {
  var n=0; for(var k in cart) n+=cart[k].qty;
  document.getElementById('cartCount').textContent=n;
}
function toggleCart() {
  document.getElementById('overlay').classList.toggle('open');
  document.getElementById('panel').classList.toggle('open');
  renderCartItems();
}
function renderCartItems() {
  updateCount();
  var el=document.getElementById('citems');
  var dlbtn=document.getElementById('dlbtn');
  var keys=Object.keys(cart);
  if(!keys.length){el.innerHTML='<div class="cempty">Tu pedido está vacío 🛒</div>';document.getElementById('ptotal').textContent='0,00 €';dlbtn.disabled=true;return;}
  dlbtn.disabled=false;
  var byProv={};
  for(var k in cart){var v=cart[k];if(!byProv[v.provider])byProv[v.provider]=[];byProv[v.provider].push({k:k,v:v});}
  var html='';var sum=0;
  for(var prov in byProv){
    var cfg=CC[CATS[prov]?CATS[prov].categoria:'']||{icon:'📦'};
    html+='<div class="cgroup"><div class="cgtitle">'+cfg.icon+' '+prov+'</div>';
    for(var i=0;i<byProv[prov].length;i++){
      var kv=byProv[prov][i];var v=kv.v;
      var sub=v.item.price*v.qty; sum+=sub;
      var sk=kv.k.replace(/['"\]/g,'_');
      html+='<div class="ci"><div class="ci-info"><div class="ci-name">'+v.item.desc+'</div><div class="ci-ref">SAP: '+(v.item.refSAP||'—')+' · x'+v.qty+'</div></div>'
        +'<div class="ci-price">'+(v.item.price>0?sub.toFixed(2).replace('.',',')+' €':'—')+'</div>'
        +'<button class="rmbtn" onclick="removeItem(''+sk+'')">✕</button></div>';
    }
    html+='</div>';
  }
  el.innerHTML=html;
  document.getElementById('ptotal').textContent=sum>0?sum.toFixed(2).replace('.',',')+' €':'—';
}
function dlExcel() {
  var sol=document.getElementById('fSol').value.trim();
  var ceco=document.getElementById('fCeco').value.trim();
  var dir=document.getElementById('fDir').value.trim();
  var cuenta=document.getElementById('fCuenta').value.trim();
  var jira=document.getElementById('fJira').value.trim();
  if(!sol||!ceco||!dir){showToast('⚠️ Rellena los campos obligatorios');return;}
  var keys=Object.keys(cart);if(!keys.length)return;
  var byProv={};
  for(var k in cart){var v=cart[k];if(!byProv[v.provider])byProv[v.provider]=[];byProv[v.provider].push(v);}
  var wb=XLSX.utils.book_new();
  for(var prov in byProv){
    var cat=CATS[prov];
    var wsData=[
      [],['Proveedor',cat?cat.proveedor:prov],['Solicitante',sol],['Dirección envío',dir],
      ['Ceco',ceco],['Cuenta',cuenta],['Jira',cat&&cat.jira?cat.jira:jira],[],
      ['REFERENCIA SAP','REFERENCIA PROVEEDOR','DESCRIPCIÓN','IMPORTE','CANTIDAD','TOTAL']
    ];
    var total=0;
    for(var i=0;i<byProv[prov].length;i++){
      var v=byProv[prov][i];var sub=v.item.price*v.qty;total+=sub;
      wsData.push([v.item.refSAP||'',v.item.refProv||'',v.item.desc,v.item.price||'',v.qty,sub||'']);
    }
    wsData.push([]);wsData.push(['','','','','TOTAL',total||'']);
    var ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[14,20,40,12,10,12].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb,ws,prov.substring(0,31));
  }
  if(Object.keys(byProv).length>1){
    var sum=[['RESUMEN PEDIDO'],['Solicitante',sol],['CECO',ceco],['Dirección',dir],[],['PROVEEDOR','ARTÍCULOS','UNIDADES','IMPORTE']];
    var gt=0;
    for(var prov in byProv){
      var units=0,imp=0;
      for(var i=0;i<byProv[prov].length;i++){units+=byProv[prov][i].qty;imp+=byProv[prov][i].item.price*byProv[prov][i].qty;}
      gt+=imp;sum.push([prov,byProv[prov].length,units,imp||'']);
    }
    sum.push(['','','TOTAL',gt||'']);
    var ws2=XLSX.utils.aoa_to_sheet(sum);
    ws2['!cols']=[25,12,12,16].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb,ws2,'RESUMEN');
  }
  var date=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb,'Pedido_'+sol.split(' ')[0]+'_'+date+'.xlsx');
  showToast('✅ Pedido descargado correctamente');
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}
buildSidebar();
showWelcome();
</script>
