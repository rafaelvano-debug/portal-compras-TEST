<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquaservice · Portal de Compras Internas</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f4f3ef;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: #e5e3db;
  --accent: #0077c8;
  --accent-light: #e8f3fc;
  --accent-dark: #005fa0;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --danger: #e04444;
  --success: #2da84f;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --sidebar: 256px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--accent);letter-spacing:-0.5px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-sub{color:var(--text-muted);font-weight:400;font-size:12px;margin-left:8px;border-left:1px solid var(--border);padding-left:10px}
.cart-btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.cart-btn:hover{background:var(--accent-dark)}
.badge{background:white;color:var(--accent);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 60px)}
aside{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;padding:16px 0}
main{flex:1;padding:24px 28px;min-width:0}

/* SIDEBAR */
.sidebar-section{margin-bottom:4px}
.sidebar-cat{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text-muted);margin-top:8px}
.sidebar-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 8px 28px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:var(--text-muted);font-weight:400;line-height:1.3}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{border-left-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
.sidebar-count{font-size:10px;font-family:'DM Mono',monospace;background:var(--border);color:var(--text-muted);border-radius:10px;padding:1px 6px;white-space:nowrap}
.sidebar-item.active .sidebar-count{background:var(--accent);color:white}

/* MAIN */
.main-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px}
.main-top h2{font-size:20px;font-weight:700;white-space:nowrap}
.main-top p{font-size:12px;color:var(--text-muted);margin-top:2px}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:240px}
.search-wrap input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;background:transparent;color:var(--text);width:100%}

/* CATALOG GRID */
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.product-img{width:100%;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);font-size:40px;color:var(--border)}
.product-body{padding:12px;flex:1;display:flex;flex-direction:column}
.product-cat-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:8px;width:fit-content}
.product-refs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.ref-badge{font-size:10px;font-family:'DM Mono',monospace;background:#eef5fb;color:var(--accent);border-radius:4px;padding:1px 5px}
.product-name{font-size:13px;font-weight:600;line-height:1.4;color:var(--text);margin-bottom:8px;flex:1}
.product-price{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:10px}
.product-price.no-price{font-size:12px;color:var(--text-muted);font-weight:400}
.qty-row{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;font-weight:500;color:var(--text)}
.qty-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.qty-input{width:40px;height:26px;border:1px solid var(--border);border-radius:5px;text-align:center;font-family:'DM Mono',monospace;font-size:13px;outline:none;color:var(--text);background:var(--surface)}
.qty-input:focus{border-color:var(--accent)}
.add-btn{margin-left:auto;background:var(--accent);color:white;border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;white-space:nowrap}
.add-btn:hover{background:var(--accent-dark)}
.add-btn.added{background:var(--success)}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state h3{font-size:17px;font-weight:600;margin:14px 0 6px;color:var(--text)}

/* CART OVERLAY */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:460px;background:var(--surface);box-shadow:var(--shadow-lg);z-index:201;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-panel.open{transform:translateX(0)}
.cart-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-size:17px;font-weight:700}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.close-btn:hover{background:var(--bg)}

/* FORM */
.form-section{padding:16px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.form-section h4{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.form-field input{border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--text)}
.form-field input:focus{border-color:var(--accent)}
.form-field.full{grid-column:1/-1}

/* CART ITEMS */
.cart-items{flex:1;overflow-y:auto;padding:14px 22px}
.cart-empty{text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px}
.cart-group{margin-bottom:18px}
.cart-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.cart-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-ref{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted)}
.cart-item-price{font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap}
.remove-item{background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px}
.remove-item:hover{background:#ffeaea}

/* CART FOOTER */
.cart-footer{padding:18px 22px;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total strong{font-size:14px;font-weight:600}
.total-price{font-size:22px;font-weight:700;color:var(--accent)}
.dl-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.dl-btn:hover{background:var(--accent-dark)}
.dl-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:white;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* WELCOME */
.welcome-screen{padding:40px 0;text-align:center;max-width:500px;margin:0 auto}
.welcome-screen h2{font-size:26px;font-weight:700;margin-bottom:10px}
.welcome-screen p{color:var(--text-muted);font-size:15px;line-height:1.6}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:32px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s}
.cat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.cat-card .cat-icon{font-size:30px;margin-bottom:8px}
.cat-card .cat-name{font-size:13px;font-weight:600}
.cat-card .cat-n{font-size:11px;color:var(--text-muted);margin-top:3px}
</style>
</head>

{"refSAP": "", "refProv": "", "desc": "Bandolera TNT", "price": 15.0, "proveedor_extra": "Proyectos Extraordinarios  105275"}, {"refSAP": "", "refProv": "", "desc": "Caja reciclar ropa", "price": 28.0, "proveedor_extra": "Proyectos Extraordinarios  105275"}]}};

const CAT_CONFIG = {
  "mobiliario":          {icon:"🪑", color:"#4f7cac", label:"Mobiliario"},
  "cartelería":          {icon:"🪧", color:"#2e7d52", label:"Cartelería"},
  "material_corporativo":{icon:"📄", color:"#7b5ea7", label:"Material Corporativo"},
  "uniformidad":         {icon:"👕", color:"#c75b3a", label:"Uniformidad"},
  "dotacion_almacenes":  {icon:"🏭", color:"#b07c2f", label:"Dotación Almacenes"},
  "merchandising":       {icon:"🎁", color:"#c2445d", label:"Merchandising"},
  "premios":             {icon:"🏆", color:"#d4a017", label:"Premios"},
};

let activeProvider = null;
let cart = {};

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const groups = {};
  for (const [name, cat] of Object.entries(CATALOGS)) {
    if (!groups[cat.categoria]) groups[cat.categoria] = [];
    groups[cat.categoria].push(name);
  }
  const sidebar = document.getElementById('sidebar');
  let html = '';
  for (const [cat, names] of Object.entries(groups)) {
    const cfg = CAT_CONFIG[cat] || {icon:'📦', color:'#888', label:cat};
    html += `<div class="sidebar-section">
      <div class="sidebar-cat">
        <span class="sidebar-cat-dot" style="background:${cfg.color}"></span>
        ${cfg.label}
      </div>`;
    for (const name of names) {
      const count = CATALOGS[name].items.length;
      html += `<div class="sidebar-item ${activeProvider===name?'active':''}" onclick="selectProvider('${name.replace(/'/g,"\'")}')" title="${name}">
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px">${name.split('·')[1]?.trim()||name}</span>
        <span class="sidebar-count">${count}</span>
      </div>`;
    }
    html += '</div>';
  }
  sidebar.innerHTML = html;
}

// ─── WELCOME ──────────────────────────────────────────────────────────────────
function showWelcome() {
  const groups = {};
  for (const [name, cat] of Object.entries(CATALOGS)) {
    if (!groups[cat.categoria]) groups[cat.categoria] = {names:[], count:0};
    groups[cat.categoria].names.push(name);
    groups[cat.categoria].count += cat.items.length;
  }
  let cards = '';
  for (const [cat, data] of Object.entries(groups)) {
    const cfg = CAT_CONFIG[cat] || {icon:'📦', color:'#888', label:cat};
    cards += `<div class="cat-card" onclick="selectProvider('${data.names[0].replace(/'/g,"\'")}')" style="border-top:3px solid ${cfg.color}">
      <div class="cat-icon">${cfg.icon}</div>
      <div class="cat-name">${cfg.label}</div>
      <div class="cat-n">${data.count} artículos</div>
    </div>`;
  }
  document.getElementById('catalogContent').innerHTML = `
    <div class="welcome-screen">
      <div style="font-size:52px">💧</div>
      <h2>Portal de Compras Internas</h2>
      <p>Selecciona una categoría para explorar el catálogo, añadir artículos al carrito y descargar el pedido en formato Excel para Jira.</p>
      <div class="cat-grid">${cards}</div>
    </div>`;
}

// ─── CATALOG ──────────────────────────────────────────────────────────────────
function selectProvider(name) {
  activeProvider = name;
  buildSidebar();
  renderCatalog();
}

function renderCatalog() {
  if (!activeProvider) { showWelcome(); return; }
  const cat = CATALOGS[activeProvider];
  if (!cat) return;
  const q = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  let items = cat.items;
  if (q) items = items.filter(i => i.desc.toLowerCase().includes(q) || i.refSAP.includes(q));
  const cfg = CAT_CONFIG[cat.categoria] || {icon:'📦', color:'#888', label:cat.categoria};
  
  let html = `<div class="main-top">
    <div>
      <h2>${cfg.icon} ${activeProvider}</h2>
      <p>${cat.proveedor} · ${items.length} artículos</p>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Buscar artículo..." id="searchInput" oninput="renderCatalog()" value="${q}">
    </div>
  </div>
  <div class="catalog-grid">`;
  
  if (!items.length) {
    html += `<div class="empty-state"><div style="font-size:32px">🔍</div><h3>Sin resultados</h3><p>Prueba con otro término</p></div>`;
  } else {
    for (const item of items) {
      const inCart = cart[item.refSAP + '_' + activeProvider];
      const qty = inCart ? inCart.qty : 1;
      const priceStr = item.price > 0 ? item.price.toFixed(2).replace('.',',') + ' €' : 'Precio a consultar';
      const eid = (item.refSAP + '_' + activeProvider).replace(/[^a-z0-9]/gi,'_');
      html += `<div class="product-card">
        <div class="product-img" style="color:${cfg.color};opacity:.3;font-size:44px">${cfg.icon}</div>
        <div class="product-body">
          <span class="product-cat-tag" style="background:${cfg.color}22;color:${cfg.color}">${cfg.label}</span>
          <div class="product-refs">
            ${item.refSAP?`<span class="ref-badge">SAP: ${item.refSAP}</span>`:''}</div>
          <div class="product-name">${item.desc}</div>
          <div class="product-price ${item.price>0?'':'no-price'}">${priceStr}</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="chgQty('${eid}',-1)">−</button>
            <input class="qty-input" type="number" min="1" value="${qty}" id="q_${eid}" onchange="setQty('${eid}',this.value)">
            <button class="qty-btn" onclick="chgQty('${eid}',1)">+</button>
            <button class="add-btn ${inCart?'added':''}" onclick="addItem('${item.refSAP}','${activeProvider.replace(/'/g,\"\\'\")}')">${inCart?'✓ Añadido':'+ Añadir'}</button>
          </div>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  document.getElementById('catalogContent').innerHTML = html;
}

// ─── CART ACTIONS ─────────────────────────────────────────────────────────────
function chgQty(eid, delta) {
  const el = document.getElementById('q_' + eid);
  if (!el) return;
  let v = parseInt(el.value) + delta;
  if (v < 1) v = 1;
  el.value = v;
  const key = eid.replace(/_/g,' '); // not perfect, use direct lookup
  if (cart[eid.replace(/_([^_]*)$/,' $1')]) {
    cart[eid.replace(/_([^_]*)$/,' $1')].qty = v;
    updateCartCount();
  }
}
function setQty(eid, val) {
  let v = parseInt(val); if (isNaN(v)||v<1) v=1;
  const key = findCartKey(eid);
  if (key && cart[key]) { cart[key].qty = v; updateCartCount(); }
}
function findCartKey(eid) {
  // eid is refSAP_providerName with spaces->_
  for (const k of Object.keys(cart)) {
    const keid = k.replace(/[^a-z0-9]/gi,'_');
    if (keid === eid) return k;
  }
  return null;
}
function addItem(refSAP, provName) {
  const cat = CATALOGS[provName];
  if (!cat) return;
  const item = cat.items.find(i => i.refSAP === refSAP);
  if (!item) return;
  const eid = (refSAP + '_' + provName).replace(/[^a-z0-9]/gi,'_');
  const qEl = document.getElementById('q_' + eid);
  const qty = qEl ? (parseInt(qEl.value)||1) : 1;
  const key = refSAP + '_' + provName;
  if (cart[key]) { cart[key].qty += qty; } 
  else { cart[key] = {item, qty, provider: provName}; }
  renderCatalog();
  renderCartItems();
  toast('✓ ' + item.desc.substring(0,35) + (item.desc.length>35?'...':'') + ' añadido');
}
function removeItem(key) {
  delete cart[key];
  renderCatalog();
  renderCartItems();
}

// ─── CART PANEL ───────────────────────────────────────────────────────────────
function toggleCart() {
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartPanel').classList.toggle('open');
  renderCartItems();
}
function updateCartCount() {
  const n = Object.values(cart).reduce((s,c)=>s+c.qty,0);
  document.getElementById('cartCount').textContent = n;
}
function renderCartItems() {
  updateCartCount();
  const el = document.getElementById('cartItems');
  const total = document.getElementById('cartTotal');
  const dlBtn = document.getElementById('dlBtn');
  const entries = Object.entries(cart);
  if (!entries.length) {
    el.innerHTML = '<div class="cart-empty">Tu pedido está vacío 🛒</div>';
    total.textContent = '0,00 €';
    dlBtn.disabled = true;
    return;
  }
  dlBtn.disabled = false;
  const byProv = {};
  entries.forEach(([k,v]) => {
    if (!byProv[v.provider]) byProv[v.provider] = [];
    byProv[v.provider].push([k,v]);
  });
  let html = '';
  let sum = 0;
  for (const [prov, kvs] of Object.entries(byProv)) {
    const cfg = CAT_CONFIG[CATALOGS[prov]?.categoria] || {icon:'📦'};
    html += `<div class="cart-group"><div class="cart-group-title">${cfg.icon} ${prov}</div>`;
    for (const [k,v] of kvs) {
      const sub = v.item.price * v.qty;
      sum += sub;
      html += `<div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${v.item.desc}</div>
          <div class="cart-item-ref">SAP: ${v.item.refSAP||'—'} · <strong>x${v.qty}</strong></div>
        </div>
        <div class="cart-item-price">${v.item.price>0?(sub.toFixed(2).replace('.',',')+' €'):'—'}</div>
        <button class="remove-item" onclick="removeItem('${k.replace(/'/g,"\\'")}')">✕</button>
      </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
  total.textContent = sum > 0 ? sum.toFixed(2).replace('.',',') + ' €' : '—';
}

// ─── EXCEL DOWNLOAD ───────────────────────────────────────────────────────────
function downloadExcel() {
  const sol = document.getElementById('fSolicitante').value.trim();
  const ceco = document.getElementById('fCeco').value.trim();
  const dir = document.getElementById('fDireccion').value.trim();
  const cuenta = document.getElementById('fCuenta').value.trim();
  const jira = document.getElementById('fJira').value.trim();
  if (!sol || !ceco || !dir) { toast('⚠️ Rellena los campos obligatorios'); return; }
  const entries = Object.entries(cart);
  if (!entries.length) return;
  const byProv = {};
  entries.forEach(([k,v]) => {
    if (!byProv[v.provider]) byProv[v.provider] = [];
    byProv[v.provider].push(v);
  });
  const wb = XLSX.utils.book_new();
  for (const [prov, items] of Object.entries(byProv)) {
    const cat = CATALOGS[prov];
    const jiraUrl = cat?.jira || jira || '';
    const wsData = [
      [],
      ['Proveedor', cat?.proveedor || prov],
      ['Solicitante', sol],
      ['Dirección envío', dir],
      ['Ceco', ceco],
      ['Cuenta', cuenta],
      ['Jira', jiraUrl],
      [],
      ['REFERENCIA SAP','REFERENCIA PROVEEDOR','DESCRIPCIÓN','IMPORTE','CANTIDAD','TOTAL'],
    ];
    let total = 0;
    for (const v of items) {
      const sub = v.item.price * v.qty;
      total += sub;
      wsData.push([v.item.refSAP||'',v.item.refProv||'',v.item.desc,v.item.price||'',v.qty,sub||'']);
    }
    wsData.push([]);
    wsData.push(['','','','','TOTAL',total||'']);
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [14,20,40,12,10,12].map(w=>{return{wch:w}});
    XLSX.utils.book_append_sheet(wb, ws, prov.substring(0,31));
  }
  if (Object.keys(byProv).length > 1) {
    const sum = [['RESUMEN PEDIDO'],['Solicitante',sol],['CECO',ceco],['Dirección',dir],[],['PROVEEDOR','ARTÍCULOS','UNIDADES','IMPORTE']];
    let gt = 0;
    for (const [prov,items] of Object.entries(byProv)) {
      const units = items.reduce((s,v)=>s+v.qty,0);
      const imp = items.reduce((s,v)=>s+v.item.price*v.qty,0);
      gt += imp;
      sum.push([prov,items.length,units,imp||'']);
    }
    sum.push(['','','TOTAL',gt||'']);
    const ws = XLSX.utils.aoa_to_sheet(sum);
    ws['!cols'] = [25,12,12,16].map(w=>{return{wch:w}});
    XLSX.utils.book_append_sheet(wb,ws,'RESUMEN');
  }
  const date = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `Pedido_${sol.split(' ')[0]}_${date}.xlsx`);
  toast('✅ Pedido descargado correctamente');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
showWelcome();
</script>
